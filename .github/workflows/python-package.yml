# Run the Python test suite on every push / PR to main.
#
# This workflow now exercises three things that the original config silently
# skipped:
#   1. The mstr_options_lab math/pricing tests (needed numpy/pandas/scipy installed).
#   2. The new tests/ tie-out checks for the LevFin v8 deliverables (needs LFS).
#   3. The top-level options_core / databento_options / options_quant_desktop tests.

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
      with:
        # Fetch LFS-tracked artefacts so the tie-out test in tests/ can read the
        # actual Word / PowerPoint deliverables instead of skipping on the pointer.
        lfs: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: requirements-dev.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Lint with flake8
      run: |
        # Hard-fail on Python syntax errors / undefined names in code we maintain.
        # Vendored sub-projects (databento-python-main, mcp_massive-master) are excluded.
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
          --exclude=databento-python-main,mcp_massive-master,Archive,.git
        # Soft warnings — exit-zero so CI is not blocked on style.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics \
          --exclude=databento-python-main,mcp_massive-master,Archive,.git

    - name: Test with pytest
      run: |
        pytest -v
